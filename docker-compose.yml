version: '3.1'

services:

  db:
    image: "postgres:12"
    restart: always
    env_file:
      .env
    ports:
      - 5433:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - db

  redis:
    image: redis
    container_name: redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - 6379:6379

  redis-commander:
    container_name: redis-commander
    image: rediscommander/redis-commander:latest
    restart: always
    environment:
    - REDIS_HOSTS=local:redis:6379
    ports:
    - "8081:8081"

  web:
    container_name: web
    build:
      context: ./
    volumes:
      - type: bind
        source: .
        target: /src
    command: npm start
    ports:
      - "3000:3000"
      - "9229:9229"
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - redis-commander


volumes:
  pgdata: